<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Leaderboard Sci Master</title>
  <link rel="icon" type="image/png" href="cropped_circle_image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
--bg:#e0e5ec;
--card:rgba(255,255,255,0.25);
--text:#111;
--accent:#0072ff;
--header:#111;
--highlight:#fff4a3;
}
body.dark{
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--text:#fff;
--accent:#00c6ff;
--header:#fff;
--highlight:#fffa65;
}
body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
color:var(--header);
backdrop-filter: blur(5px);
}
.toggle{
cursor:pointer;
padding:6px 12px;
border-radius:20px;
background:var(--accent);
color:white;
display:flex;
align-items:center;
justify-content:center;
}
.container{
max-width:1000px;
margin:auto;
padding:15px;
}
.card{
backdrop-filter:blur(15px);
background:var(--card);
border-radius:20px;
padding:20px;
margin-top:20px;
transition:0.3s;
overflow-x:auto;
}
table{
width:100%;
border-collapse:collapse;
min-width:600px;
}
th, td{
padding:12px 15px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.1);
color:var(--header);
font-size:14px;
transition:0.2s;
}
th{
background:rgba(255,255,255,0.2);
color:var(--header);
backdrop-filter:blur(10px);
border-radius:10px;
}
tr:hover{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(5px);
border-radius:10px;
}
.currentUser{
background:var(--highlight) !important;
font-weight:bold;
}
.medal{
font-size:16px;
display:inline-block;
animation:bounce 1s infinite alternate;
cursor:pointer;
}
.gold{color:#FFD700;}
.silver{color:#C0C0C0;}
.bronze{color:#cd7f32;}
.glow{
display:inline-block;
color:#fffa65;
animation:glimmer 1.5s infinite alternate;
}
.alert-overlay, #glassAlert{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.3s;z-index:9999;
}
.alert-overlay.active, #glassAlert.show{opacity:1;pointer-events:auto;}
.alert-box, #glassAlertBox{
background:rgba(255,255,255,0.2);backdrop-filter:blur(15px);padding:25px 35px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:#000000;
font-weight: bold;font-size:20px;text-align:center;transform:translateY(-20px);transition:0.3s;
}
#glassAlert{
position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);display:none;
}
@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-5px);}
}
@keyframes glimmer{
0%{opacity:0.6; transform:scale(1);}
50%{opacity:1; transform:scale(1.05);}
100%{opacity:0.6; transform:scale(1);}
}
@media(max-width:600px){
header{font-size:18px;}
th, td{padding:8px 10px; font-size:12px;}
.card{padding:15px;}
.medal{font-size:14px;}
table{min-width:100%;}
}
</style>
</head>
<body>

<header>
Leaderboard
<div class="toggle" onclick="toggleMode()">
<i id="modeIcon" class="fa-solid fa-sun"></i>
</div>
</header>

<div class="container">
<div class="card">
<h3 style="text-align:center;margin-bottom:15px;">All Players Leaderboard</h3>
<table id="leaderboardTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>School</th>
<th>Score</th>
<th>Time</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</div>

<div id="customAlert" class="alert-overlay">
<div class="alert-box"><p id="alertMessage">⚠️ Action Blocked!</p></div>
</div>
<div id="glassAlert"><div id="glassAlertBox">⚠️ Action Blocked!</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCTfQQHRjOf361iehJWd6Ao4on8yReT1l4",
authDomain: "scimasterquiz.firebaseapp.com",
projectId: "scimasterquiz"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const leaderboardTable = document.querySelector("#leaderboardTable tbody");

// Current user key
const currentUserKey = "Alice : ABC School";

function showAlert(msg){
  const alertOverlay = document.getElementById("customAlert");
  document.getElementById("alertMessage").innerText = msg;
  alertOverlay.classList.add("active");
  setTimeout(()=>alertOverlay.classList.remove("active"),2000);
}

function showGlassAlert(msg){
  const glass = document.getElementById("glassAlert");
  document.getElementById("glassAlertBox").innerText = msg||"⚠️ Action Blocked!";
  glass.style.display="flex";
  setTimeout(()=>glass.style.display="none",2000);
}

// Leaderboard update
function updateLeaderboard(){
  const participantsRef = collection(db,"participants");
  const q = query(participantsRef, orderBy("score","desc"), orderBy("timestamp","asc"));

  onSnapshot(q, snap => {
    let html = "";
    let rank = 1, displayRank = 1, prevScore = null;

    snap.forEach(doc => {
      const data = doc.data();
      const [name, school] = data.key.split(' : ');

      if(prevScore !== null && data.score < prevScore){
        rank = displayRank;
      }
      prevScore = data.score;

      let ts = data.timestamp?.toDate?.();
      let tsStr = ts ? `${ts.getHours().toString().padStart(2,'0')}:${ts.getMinutes().toString().padStart(2,'0')}` : "";

      let medal = "";
      let medalClick = "";
      if(rank === 1){ medal='🥇'; medalClick="onclick='confetti({particleCount:150,spread:70,origin:{y:0.6}})'";}
      else if(rank === 2){ medal='🥈'; medalClick="onclick='confetti({particleCount:150,spread:70,origin:{y:0.6}})'";}
      else if(rank === 3){ medal='🥉'; medalClick="onclick='confetti({particleCount:150,spread:70,origin:{y:0.6}})'";}
      else medal='✨';

      const highlightClass = (data.key===currentUserKey)?"currentUser":"";

      html += `<tr class="${highlightClass}">
<td><span class="medal" ${medalClick}>${medal} ${rank}</span></td>
<td>${name}</td>
<td>${school}</td>
<td>${data.score}</td>
<td>${tsStr}</td>
</tr>`;

      displayRank++;
    });

    leaderboardTable.innerHTML = html;
  });
}

updateLeaderboard();

// Toggle dark/light mode
window.toggleMode = function(){
  document.body.classList.toggle("dark");
  const icon = document.getElementById("modeIcon");
  if(document.body.classList.contains("dark")){
    icon.classList.replace("fa-sun","fa-moon");
  } else {
    icon.classList.replace("fa-moon","fa-sun");
  }
}

// Block right-click / copy / paste
document.addEventListener('contextmenu', e=>{ e.preventDefault(); showGlassAlert("Right Click Blocked!"); });
document.addEventListener('copy', e=>{ e.preventDefault(); showGlassAlert("Copy Blocked!"); });
document.addEventListener('cut', e=>{ e.preventDefault(); showGlassAlert("Cut Blocked!"); });
document.addEventListener('paste', e=>{ e.preventDefault(); showGlassAlert("Paste Blocked!"); });

// Block DevTools
document.addEventListener('keydown', e=>{
  if(e.key==='F12' || 
    (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
    (e.ctrlKey && e.key==='U')){
    e.preventDefault();
    showGlassAlert("DevTools Blocked!");
  }
});
</script>

</body>
</html>
