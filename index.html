<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Sci Quiz Master Leaderboard</title>
  <link rel="icon" type="image/png" href="cropped_circle_image.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
body {margin:0; font-family:Segoe UI,sans-serif; background:#0f172a; color:white; text-align:center;}
header{padding:15px; font-size:22px; font-weight:bold;}
.card{max-width:500px; margin:10px auto; background:rgba(255,255,255,0.05); backdrop-filter:blur(15px); border-radius:15px; padding:15px;}
table{width:100%; border-collapse:collapse; font-size:14px;}
th,td{padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); word-break: break-word;}
tr:hover{background:rgba(255,255,255,0.1); cursor:pointer;}
.top1{background:linear-gradient(90deg,#FFD70033,#FFD70011);}
.top2{background:linear-gradient(90deg,#C0C0C033,#C0C0C011);}
.top3{background:linear-gradient(90deg,#cd7f3233,#cd7f3211);}
.you-rank{margin-top:8px; font-weight:bold; color:#00ffcc; font-size:16px;}
.popup-box{background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; width:80%; max-width:300px; animation:slideUp 0.4s ease;}
#popup{position:fixed; top:0; left:0; width:100%; height:100%; display:none; justify-content:center; align-items:center; background:rgba(0,0,0,0.7); z-index:9999; transition:0.3s;}
#popup.active{backdrop-filter:blur(8px);}
.medal{font-size:50px; animation:pulse 1s infinite alternate;}
@keyframes pulse{from{transform:scale(1);} to{transform:scale(1.15);}}
.glow-gold{color:#FFD700;text-shadow:0 0 10px #FFD700;}
.glow-silver{color:#C0C0C0;text-shadow:0 0 10px #C0C0C0;}
.glow-bronze{color:#cd7f32;text-shadow:0 0 10px #cd7f32;}
@keyframes slideUp{from{transform:translateY(40px) scale(0.8);opacity:0;} to{transform:translateY(0) scale(1);opacity:1;}}
</style>
</head>
<body>

<header>🏆 Sci Quiz Master</header>

<div class="card">
  <div id="yourRank" class="you-rank"></div>
  <table>
    <thead>
      <tr><th>Rank</th><th>Name</th><th>School</th><th>Score</th></tr>
    </thead>
    <tbody id="leaderboardTable">
      <tr><td colspan="4">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Popup -->
<div id="popup">
  <div class="popup-box">
    <div id="popupMedal" class="medal"></div>
    <h3 id="popupName"></h3>
    <p id="popupSchool"></p>
    <h4 id="popupScore"></h4>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTfQQHRjOf361iehJWd6Ao4on8yReT1l4",
  authDomain: "scimasterquiz.firebaseapp.com",
  projectId: "scimasterquiz"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("leaderboardTable");
const yourRankDiv = document.getElementById("yourRank");
const currentUserKey = "Krishantha : Gsc Matale";

// ---------------- Leaderboard Functions ----------------
async function updateLeaderboard(){
  try{
    const q = query(collection(db,"participants"), orderBy("score","desc"), limit(10));
    const snap = await getDocs(q);
    const data = [];
    snap.forEach(doc=>{
      const d = doc.data();
      data.push({key:d.key, score:d.score});
    });
    render(data);
  }catch(e){
    console.error(e);
    table.innerHTML="<tr><td colspan='4'>Error loading data</td></tr>";
  }
}

function render(data){
  table.innerHTML="";
  let rank=1;
  let foundRank=null;
  data.forEach(d=>{
    let rowClass="";
    if(rank===1) rowClass="top1";
    else if(rank===2) rowClass="top2";
    else if(rank===3) rowClass="top3";

    if(d.key===currentUserKey) foundRank=rank;
    const [name, school] = d.key.split(" : ");

    table.innerHTML += `<tr class="${rowClass}" onclick="openPopup(${rank},'${name}','${school}',${d.score})">
      <td>${rank}</td><td>${name}</td><td>${school}</td><td>${d.score}</td>
    </tr>`;
    rank++;
  });
  if(foundRank) yourRankDiv.innerText="🔥 You are Rank #"+foundRank;
}

// ---------------- Popup Functions ----------------
window.openPopup=function(rank,name,school,score){
  const popup=document.getElementById("popup");
  popup.style.display="flex";
  setTimeout(()=>popup.classList.add("active"),10);

  document.getElementById("popupName").innerText=name;
  document.getElementById("popupSchool").innerText="🏫 "+school;
  document.getElementById("popupScore").innerText="Score: "+score;

  const medal=document.getElementById("popupMedal");
  medal.className="medal";
  if(rank===1){ medal.innerText="🥇"; medal.classList.add("glow-gold"); confetti({particleCount:200,spread:100}); }
  else if(rank===2){ medal.innerText="🥈"; medal.classList.add("glow-silver"); }
  else if(rank===3){ medal.innerText="🥉"; medal.classList.add("glow-bronze"); }
  else{ medal.innerText="🎖"; }
}

window.closePopup=function(){
  const popup=document.getElementById("popup");
  popup.classList.remove("active");
  popup.style.display="none";
}

// ---------------- 6PM Daily Update ----------------
function scheduleDailyUpdate() {
    const now = new Date();
    const next6pm = new Date();
    next6pm.setHours(18,0,0,0);
    if(now > next6pm) next6pm.setDate(next6pm.getDate() + 1);

    const delay = next6pm - now;
    setTimeout(async () => {
        await checkUserLimit();
        scheduleDailyUpdate();
    }, delay);
}

// ---------------- User Limit + Auto-Unblock ----------------
async function checkUserLimit() {
  try {
    const settingsRef = doc(db, "settings", "dailyLimit");
    const settingsSnap = await getDoc(settingsRef);
    const now = new Date();

    let data = settingsSnap.exists() ? settingsSnap.data() : {};
    const lastReset = data.lastReset ? new Date(data.lastReset.seconds*1000) : null;

    const today6am = new Date();
    today6am.setHours(6,0,0,0);

    // Auto reset at 6AM
    if(!lastReset || lastReset < today6am){
      await setDoc(settingsRef, { blocked: false, lastReset: now });
      data.blocked = false;
    }

    // Count participants
    const snap = await getDocs(collection(db,"participants"));
    const userCount = snap.size;

    if(userCount > 1500){
      await setDoc(settingsRef, { blocked: true, lastReset: now });
      showBlockedPopup();
    } else if(!data.blocked){
      updateLeaderboard();
    } else {
      showBlockedPopup();
    }
  } catch(e){
    console.error(e);
    table.innerHTML="<tr><td colspan='4'>Error loading data</td></tr>";
  }
}

// ---------------- Block Popup ----------------
function showBlockedPopup() {
  const popup = document.getElementById("popup");
  popup.style.display="flex";
  setTimeout(()=>popup.classList.add("active"),10);

  document.getElementById("popupMedal").innerText="⚠️";
  document.getElementById("popupName").innerText="Site Temporarily Blocked";
  document.getElementById("popupSchool").innerText="Daily user limit exceeded";
  document.getElementById("popupScore").innerText="Access will reopen next day 6AM";

  table.innerHTML="<tr><td colspan='4'>Access Blocked Today</td></tr>";
}

// ---------------- Init ----------------
checkUserLimit();
scheduleDailyUpdate();

// ---------------- Disable Right Click / DevTools ----------------
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('copy', e=>e.preventDefault());
document.addEventListener('cut', e=>e.preventDefault());
document.addEventListener('paste', e=>e.preventDefault());
document.addEventListener('keydown', e=>{
  if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))||(e.ctrlKey&&e.key==='U')) e.preventDefault();
});
</script>
</body>
</html>
