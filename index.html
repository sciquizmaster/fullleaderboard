<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Leaderboard Sci Master</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
:root{
--bg:#e0e5ec;
--card:rgba(255,255,255,0.25);
--text:#111;
--accent:#0072ff;
--header:#111;
}
body.dark{
--bg:#0f172a;
--card:rgba(255,255,255,0.05);
--text:#fff;
--accent:#00c6ff;
--header:#fff;
}
body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
color:var(--header);
backdrop-filter: blur(5px);
}
.toggle{
cursor:pointer;
padding:6px 12px;
border-radius:20px;
background:var(--accent);
color:white;
display:flex;
align-items:center;
justify-content:center;
}
.container{
max-width:1000px;
margin:auto;
padding:15px;
}
.card{
backdrop-filter:blur(15px);
background:var(--card);
border-radius:20px;
padding:20px;
margin-top:20px;
transition:0.3s;
overflow-x:auto; /* make table scrollable */
}
table{
width:100%;
border-collapse:collapse;
backdrop-filter:blur(10px);
min-width:500px; /* allow horizontal scroll on mobile */
}
th, td{
padding:10px 12px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.1);
color:var(--header);
font-size:14px;
}
th{
background:rgba(255,255,255,0.2);
color:var(--header);
backdrop-filter:blur(10px);
border-radius:10px;
}
tr:hover{
background:rgba(255,255,255,0.1);
}

/* Animated Medals */
.medal{
font-size:16px;
display:inline-block;
animation:bounce 1s infinite alternate;
}
.gold{color:#FFD700;}
.silver{color:#C0C0C0;}
.bronze{color:#cd7f32;}
.glow{
display:inline-block;
color:#fffa65;
animation:glimmer 1.5s infinite alternate;
}
@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-5px);}
}
@keyframes glimmer{
0%{opacity:0.6; transform:scale(1);}
50%{opacity:1; transform:scale(1.05);}
100%{opacity:0.6; transform:scale(1);}
}

/* Responsive adjustments */
@media(max-width:600px){
header{font-size:18px;}
th, td{padding:8px 10px; font-size:12px;}
.card{padding:15px;}
.medal{font-size:14px;}
}
</style>
</head>
<body>

<header>
Quiz Leaderboard
<div class="toggle" onclick="toggleMode()">
  <i id="modeIcon" class="fa-solid fa-sun"></i>
</div>
</header>

<div class="container">
<div class="card">
<h3 style="text-align:center;margin-bottom:15px;">Full Leaderboard</h3>
<table id="leaderboardTable">
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>School</th>
<th>Marks</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCTfQQHRjOf361iehJWd6Ao4on8yReT1l4",
  authDomain: "scimasterquiz.firebaseapp.com",
  projectId: "scimasterquiz",
  storageBucket: "scimasterquiz.firebasestorage.app",
  messagingSenderId: "234379811433",
  appId: "1:234379811433:web:c81613ba47357caefca0f8",
  measurementId: "G-TTY3CYQWSC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const leaderboardTable = document.querySelector("#leaderboardTable tbody");

function updateLeaderboard(){
  const participantsRef = collection(db,"participants");
  const q = query(participantsRef, orderBy("score","desc"));

  onSnapshot(q, snap => {
    let html = "";
    let rank = 1;
    snap.forEach(doc => {
      const data = doc.data();
      let medal = "";
      if(rank===1) medal = '<span class="medal gold">🥇</span>';
      else if(rank===2) medal = '<span class="medal silver">🥈</span>';
      else if(rank===3) medal = '<span class="medal bronze">🥉</span>';
      else medal = '<span class="glow">✨</span>';
      
      const [name, school] = data.key.split(" : ");
      html += `<tr>
        <td>${medal} ${rank}</td>
        <td>${name}</td>
        <td>${school}</td>
        <td>${data.score}</td>
      </tr>`;
      rank++;
    });
    leaderboardTable.innerHTML = html;
  });
}

updateLeaderboard();

// Toggle Mode
window.toggleMode = function(){
  document.body.classList.toggle("dark");
  const icon = document.getElementById("modeIcon");
  if(document.body.classList.contains("dark")){
    icon.classList.remove("fa-sun");
    icon.classList.add("fa-moon");
  } else {
    icon.classList.remove("fa-moon");
    icon.classList.add("fa-sun");
  }
}
</script>

</body>
</html>
